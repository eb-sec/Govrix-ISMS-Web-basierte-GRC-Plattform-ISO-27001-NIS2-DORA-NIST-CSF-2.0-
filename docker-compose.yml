version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: isms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: isms_db
      POSTGRES_USER: isms_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/03_seed.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isms_user -d isms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - isms_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: isms_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mustergmbh.de
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - isms_network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: isms_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://isms_user:${DB_PASSWORD:-changeme_in_prod}@postgres:5432/isms_db
      JWT_SECRET: ${JWT_SECRET:-dev_secret_min_32_chars_change_in_prod}
      JWT_EXPIRY: 8h
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_REDIRECT_URI: ${ENTRA_REDIRECT_URI:-http://localhost:3000/auth/callback}
      PORT: 3000
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma3:4b
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src:ro
    networks:
      - isms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: isms_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - isms_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  isms_network:
    driver: bridge
